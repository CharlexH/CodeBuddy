[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts = pre:scripts/inject-ota-trust.py
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_codebuddy.csv
board_build.arduino.memory_type = qio_opi
build_flags =
 -DESP32S3
 -DBOARD_HAS_PSRAM
 -mfix-esp32-psram-cache-issue
 -DCORE_DEBUG_LEVEL=0
 -DARDUINO_USB_CDC_ON_BOOT=1
 -DARDUINO_USB_MODE=1
 -DCODE_BUDDY_OTA_ENABLED=1
 -Igenerated/ota-trust
build_src_filter = +<*> +<buddies/>
lib_deps =
 m5stack/M5Unified
 m5stack/M5PM1
 bitbank2/AnimatedGIF @ ^2.1.1
 bblanchon/ArduinoJson @ ^7.0.0
